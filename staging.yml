apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-app
  namespace: zomato-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zomato-app
  template:
    metadata:
      labels:
        app: zomato-app
    spec:
      containers:
      - name: zomato-app
        image: <IMAGE_URL>
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: zomato-service
  namespace: zomato-staging
spec:
  type: NodePort
  selector:
    app: zomato-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
